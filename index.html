<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Teacher Vote</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Teacher Excellence Vote</h1>
        <p>Select exactly 10 teachers. Results appear after all 15 votes.</p>
      </header>
      <section class="card">
        <h2>Vote</h2>
        <label class="field">
          <span>Voter Code (T01–T15)</span>
          <input id="voterCode" type="text" placeholder="T01" />
        </label>
        <div class="toolbar">
          <span id="counter">0 / 10 selected</span>
          <button id="submitBtn">Submit Vote</button>
        </div>
        <div id="teachers" class="grid"></div>
        <p id="message" class="message"></p>
      </section>
      <section class="card">
        <h2>Progress</h2>
        <div id="progress" class="progress">Loading...</div>
      </section>
      <section class="card">
        <h2>Results</h2>
        <div id="results" class="results">Not ready.</div>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
